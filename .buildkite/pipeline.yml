# Buildkite pipeline for deploying a Segment destination function.
#
# Pipeline activation (creating the pipeline, the GitHub webhook, and the agent
# queue) is configured in the Buildkite UI — not here.
#
# Steps run inside Twilio's internal base-node image from registry.twilio.com
# (the general-* agents can't reach Docker Hub). This mirrors the convention used
# by other Node deploy pipelines on this cluster, e.g.
# twilio-internal/enterprise-provisioning-serverless.
#
# Deploy secrets (FUNCTION_ID, PUBLIC_API_TOKEN) live in AWS Secrets Manager:
#   secret  : segment/destination-function-template  (region us-west-2)
#   account : 058449100246
# The deploy step assumes an IAM role via the Buildkite OIDC provider
# (aws-assume-role-with-web-identity), then reads the secret with the AWS CLI.
# No static AWS keys or Buildkite-stored secrets are involved. The IAM role's
# trust policy is scoped to this pipeline's slug (destination-function-template).
# This follows the internal "Assuming IAM Roles" guide.

agents:
  # Must be a queue with connected agents on the twilio-primary-default cluster.
  # The `default` queue is paused / has no agents — jobs sent there hang in
  # "queuing" forever. `general-001` is a live general-purpose pool.
  queue: general-001

steps:
  # TEMP DIAGNOSTIC — remove once the 403 is understood. The deploy token works
  # from a laptop (GET/PATCH both 200), so a 403 from the agent points at the
  # network path (egress proxy / firewall) rather than auth. This probes that.
  - label: ':mag: DEBUG egress to Segment'
    key: debug-egress
    command: |
      echo '--- proxy env on host'
      env | grep -iE 'proxy' || echo '(no proxy vars set)'
      echo '--- host: GET api.segmentapis.com (status + any proxy/WAF body)'
      curl -sS -D - -o /dev/null --max-time 20 https://api.segmentapis.com/ || echo "host curl failed: $?"
      echo '--- inside node:22 container (same way deploy runs)'
      docker run --rm registry.twilio.com/library/base-node/22:22 sh -c \
        "curl -sS -D - -o /dev/null --max-time 20 https://api.segmentapis.com/ || echo container-curl-failed=\$?"

  - wait

  - label: ':jest: Install & Test'
    key: test
    # The general-* agents are bare hosts without Node/npm on the PATH, but they
    # do provide Docker. Run the build inside Twilio's internal base-node image
    # (Docker Hub is not reachable from these agents; registry.twilio.com is).
    plugins:
      - docker#v5.9.0:
          image: 'registry.twilio.com/library/base-node/22:22'
          command: ['sh', '-c', 'npm ci && npm test']

  - wait

  - label: ':rocket: Deploy to DEV'
    key: deploy-dev
    depends_on: test
    # Feature branches deploy to DEV; main is reserved for promotion below.
    branches: '!main'
    env:
      DEPLOY_ENV: DEV
    # The assume-role plugin sets temporary AWS credentials on the agent. We then
    # read the secret with the AWS CLI on the host and pass the two values into
    # the node container (node:22 has no AWS CLI, so the fetch must happen first).
    # $$VAR escapes runtime shell vars so Buildkite does not interpolate them at
    # pipeline-upload time.
    plugins:
      - aws-assume-role-with-web-identity#v1.4.0:
          role-arn: arn:aws:iam::058449100246:role/twilio-internal_destination-function-template
    command: |
      source .buildkite/fetch-secrets.sh
      docker run --rm \
        -v "$$PWD":/workdir -w /workdir \
        -e DEPLOY_ENV \
        -e FUNCTION_ID="$$FUNCTION_ID" \
        -e PUBLIC_API_TOKEN="$$PUBLIC_API_TOKEN" \
        registry.twilio.com/library/base-node/22:22 \
        sh -c 'npm ci && node ./scripts/deployDestinationFunction.js --unhandled-rejections=strict'

  # ---------------------------------------------------------------------------
  # Multi-environment promotion (uncomment to enable). Mirrors the QA/PROD jobs
  # from the old GitHub Actions workflow. In Buildkite, promotion is gated by a
  # manual `block` step rather than a `!!_RELEASE_TO_QA` pull request label.
  # ---------------------------------------------------------------------------
  # - block: ':raised_hand: Release to QA'
  #   prompt: 'Promote this build to the QA environment?'
  #   branches: 'main'
  #
  # - label: ':rocket: Deploy to QA'
  #   key: deploy-qa
  #   branches: 'main'
  #   env:
  #     DEPLOY_ENV: QA
  #   plugins:
  #     - aws-assume-role-with-web-identity#v1.4.0:
  #         role-arn: arn:aws:iam::058449100246:role/twilio-internal_destination-function-template
  #   command: |
  #     source .buildkite/fetch-secrets.sh
  #     docker run --rm \
  #       -v "$$PWD":/workdir -w /workdir \
  #       -e DEPLOY_ENV \
  #       -e FUNCTION_ID="$$FUNCTION_ID" \
  #       -e PUBLIC_API_TOKEN="$$PUBLIC_API_TOKEN" \
  #       registry.twilio.com/library/base-node/22:22 \
  #       sh -c 'npm ci && npm test && node ./scripts/deployDestinationFunction.js --unhandled-rejections=strict'
  #
