# Buildkite pipeline for deploying the destination-function-template Segment
# Destination Function.
#
# Environments (mirrors the JPMC destination-function release procedure):
#   * DEV  — runs on feature-branch builds (not main).
#   * QA   — runs when the PR carries the !!_RELEASE_TO_QA label.
#   * PROD — runs on the main branch.
#
# Each env step runs the FULL gate for that environment: install -> test ->
# deploy. Test runs inside every env step, so each promotion re-validates.
#
# Commit statuses are published per-step using the step KEY as the context
# (use_step_key_as_commit_status), so GitHub shows buildkite/<slug>/dev, /qa,
# /prod (lowercased). A skipped step (filtered by `if:`/branches) publishes no
# status, so an un-run QA correctly leaves merge blocked until the
# !!_RELEASE_TO_QA label triggers it.
#
# Unlike the JPMC fleet (three AWS accounts), the template deploys ALL envs from
# ONE account (058449100246). The per-env FUNCTION_ID and the shared
# PUBLIC_API_TOKEN are read from AWS Secrets Manager by .buildkite/fetch-secrets.sh
# (see that file for the secret names). Each step assumes the same IAM role via
# the agent.buildkite.com OIDC provider, then reads the secrets. The node runs
# in Twilio's internal base-node image (Docker Hub is not reachable from the
# agents; registry.twilio.com is). HUSKY=0 skips the git-hook install.
#
# `set -euo pipefail` + the chained `&&` make any failure (failed secret fetch,
# test failure, deploy error) fail the step hard, so a broken build never
# proceeds to deploy or reports a green status.

agents:
  # Must be a queue with connected agents on the twilio-primary-default cluster.
  # The `default` queue is paused / has no agents.
  queue: general-001

steps:
  - label: ':rocket: DEV'
    key: DEV
    branches: '!main'
    env:
      DEPLOY_ENV: DEV
    plugins:
      - aws-assume-role-with-web-identity#v1.6.0:
          role-arn: arn:aws:iam::058449100246:role/twilio-internal_destination-function-template
    command: |
      set -euo pipefail
      source .buildkite/fetch-secrets.sh
      docker run --rm \
        -v "$$PWD":/workdir -w /workdir \
        -e DEPLOY_ENV \
        -e HUSKY=0 \
        -e FUNCTION_ID \
        -e PUBLIC_API_TOKEN \
        registry.twilio.com/library/base-node/22:22 \
        sh -c 'npm ci --no-audit --no-fund --loglevel=error && npm test && node ./scripts/deployDestinationFunction.js --unhandled-rejections=strict'

  - label: ':rocket: QA'
    key: QA
    if: build.pull_request.labels includes "!!_RELEASE_TO_QA"
    env:
      DEPLOY_ENV: QA
    plugins:
      - aws-assume-role-with-web-identity#v1.6.0:
          role-arn: arn:aws:iam::058449100246:role/twilio-internal_destination-function-template
    command: |
      set -euo pipefail
      source .buildkite/fetch-secrets.sh
      docker run --rm \
        -v "$$PWD":/workdir -w /workdir \
        -e DEPLOY_ENV \
        -e HUSKY=0 \
        -e FUNCTION_ID \
        -e PUBLIC_API_TOKEN \
        registry.twilio.com/library/base-node/22:22 \
        sh -c 'npm ci --no-audit --no-fund --loglevel=error && npm test && node ./scripts/deployDestinationFunction.js --unhandled-rejections=strict'

  - label: ':rocket: PROD'
    key: PROD
    if: build.branch == "main"
    env:
      DEPLOY_ENV: PROD
    plugins:
      - aws-assume-role-with-web-identity#v1.6.0:
          role-arn: arn:aws:iam::058449100246:role/twilio-internal_destination-function-template
    command: |
      set -euo pipefail
      source .buildkite/fetch-secrets.sh
      docker run --rm \
        -v "$$PWD":/workdir -w /workdir \
        -e DEPLOY_ENV \
        -e HUSKY=0 \
        -e FUNCTION_ID \
        -e PUBLIC_API_TOKEN \
        registry.twilio.com/library/base-node/22:22 \
        sh -c 'npm ci --no-audit --no-fund --loglevel=error && npm test && node ./scripts/deployDestinationFunction.js --unhandled-rejections=strict'
